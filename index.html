<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Mirror - Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="brand-header">
        <img src="ballena.png" width="80" alt="Logo" onerror="this.style.display='none'">
        <h1>WHALE MIRROR</h1>
        <p class="tagline">SISTEMA DE AUDITORÍA BLOCKCHAIN NIVEL 4</p>
    </div>

    <div class="search-container" id="search-bar-container" style="display: none;">
        <input type="text" id="coin-search" placeholder="🔍 Buscar moneda (Ej: Solana)..." onkeyup="searchCoins()">
    </div>

    <div class="chart-container">
        <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=D&theme=dark" width="100%" height="250" frameborder="0"></iframe>
    </div>

    <div class="radar-header">
        <span>📡 RADAR LIVE (<span id="coin-count-display">10</span> ACTIVOS)</span>
        <span id="timer-display">10:00</span>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Activo<br><small>Moneda</small></th>
                    <th>Estado<br><small>Acción</small></th>
                    <th>Flujo USD<br><small>Monto</small></th>
                    <th>Wallet<br><small>ID</small></th>
                    <th>Red<br><small>Blockchain</small></th>
                    <th>Impacto<br><small>Volatilidad</small></th>
                    <th>Tipo<br><small>Origen</small></th>
                    <th>Liquidez<br><small>Respaldo</small></th>
                    <th>Seguridad<br><small>Contrato</small></th>
                    <th>Análisis<br><small>Detalles</small></th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <button id="load-more-btn" class="btn-gold" style="display: none;" onclick="loadMoreCoins()">CARGAR 20 MÁS</button>
    <button id="sub-btn" class="btn-gold" onclick="openSubscription()">ACCESO PRO (SUSCRIBIRSE)</button>
</div>

<div id="modal" class="modal">
    <div class="modal-content" id="modal-content"></div>
</div>

<script src="script.js"></script>
</body>
</html>
