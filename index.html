<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Mirror - Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="brand-header">
        <img src="ballena.png" width="80" alt="Logo" onerror="this.style.display='none'">
        <h1>WHALE MIRROR</h1>
        <p class="tagline">SISTEMA DE AUDITORÍA BLOCKCHAIN NIVEL 4</p>
    </div>

    <div class="search-container" id="search-bar-container" style="display: none;">
        <input type="text" id="coin-search" placeholder="🔍 Buscar moneda o sigla..." onkeyup="searchCoins()">
    </div>

    <div class="chart-container">
        <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=D&theme=dark" width="100%" height="250" frameborder="0"></iframe>
    </div>

    <div class="radar-header">
        <span>📡 RADAR LIVE</span>
        <span id="timer-display">10:00</span>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Activo</th>
                    <th>Estado</th>
                    <th>Flujo USD</th>
                    <th>Wallet</th>
                    <th>Red</th>
                    <th>Impacto</th>
                    <th>Tipo</th>
                    <th>Liquidez</th>
                    <th>Seguridad</th>
                    <th>Análisis</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <button id="sub-btn" class="btn-gold" onclick="toggleProMode()">ACCESO TOTAL (SUSCRIBIRSE)</button>
</div>

<button class="dev-mode-btn" onclick="toggleProMode()">DEBUG PRO</button>

<script src="script.js"></script>
</body>
</html>
