<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Mirror - Terminal Elite</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; --green: #00ff88; --red: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 15px; }
        .container { max-width: 500px; margin: auto; }

        /* CABECERA */
        .header { text-align: center; padding: 15px 0; }
        .quote-box { display: flex; align-items: center; gap: 15px; background: #161616; padding: 15px; border-radius: 12px; border: 1px dashed var(--gold); margin-bottom: 20px; }
        
        /* WIDGET TRADINGVIEW */
        #tv-widget { height: 260px; margin-bottom: 25px; border-radius: 12px; overflow: hidden; border: 1px solid #222; }

        /* NOTICIAS */
        .news-card { background: var(--card); padding: 15px; border-radius: 12px; border-left: 4px solid var(--gold); margin-bottom: 12px; cursor: pointer; display: flex; gap: 12px; align-items: center; }
        .news-img { width: 55px; height: 55px; border-radius: 8px; object-fit: contain; background: #000; padding: 5px; }

        /* TABLA RADAR */
        .radar-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; font-size: 0.8rem; }
        .table-wrapper { width: 100%; overflow-x: auto; background: var(--card); border-radius: 12px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #1a1a1a; color: #666; font-size: 0.65rem; padding: 15px; text-align: left; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 0.85rem; font-family: 'Roboto Mono', monospace; }

        /* DASHBOARD PRO (Estilo de tu imagen) */
        .pro-dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .metric-card { background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #333; }
        .metric-val { display: block; font-size: 1.1rem; font-weight: bold; color: var(--gold); }
        .metric-label { font-size: 0.6rem; color: #777; text-transform: uppercase; letter-spacing: 1px; }
        .pressure-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; margin: 8px 0; overflow: hidden; }
        .pressure-fill { height: 100%; background: var(--green); transition: width 0.5s; }

        /* BOTONES */
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; overflow-y: auto; padding: 20px; }
        .modal-content { background: #0a0a0a; border: 1px solid var(--gold); border-radius: 20px; padding: 30px; max-width: 500px; margin: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="color:var(--gold); letter-spacing:4px;">WHALE MIRROR</h1>
        <div class="quote-box">
            <img src="https://img.icons8.com/fluency/96/whale.png" width="40">
            <p style="font-size:0.8rem; font-style:italic;">"Información institucional para el trader independiente."</p>
        </div>
    </div>

    <div id="tv-widget"></div>

    <div id="news-section">
        <p style="color:var(--gold); font-size:0.75rem; margin-bottom:12px; font-weight:bold;">🔥 ALERTAS DE IMPACTO (LIVE)</p>
        <div id="news-list"></div>
    </div>

    <div class="radar-header" style="margin-top:25px;">
        <span style="color:var(--gold);">📡 RADAR SMART MONEY</span>
        <span id="timer" style="color:var(--red);">05:00</span>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Activo</th>
                    <th>Operación</th>
                    <th>Monto USD</th>
                    <th>Precio</th>
                    <th>Terminal</th>
                </tr>
            </thead>
            <tbody id="whale-table"></tbody>
        </table>
    </div>

    <button id="btn-view-all" class="btn btn-outline" onclick="abrirSuscripcion()">VER +500 MONEDAS (ACCESO PRO) ↓</button>
    <button class="btn btn-gold" onclick="abrirSuscripcion()">SUSCRIBIRSE CON BINANCE PAY</button>
</div>

<div id="modal" class="modal">
    <div class="modal-content" id="modal-body"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let ES_PRO = false; 

    // Widget Real
    new TradingView.widget({
        "container_id": "tv-widget",
        "symbol": "BINANCE:BTCUSDT",
        "interval": "D", "theme": "dark", "width": "100%", "height": 260, "locale": "es"
    });

    const monedasElite = ['BTC', 'ETH', 'SOL', 'AVAX', 'BNB', 'LINK', 'DOT', 'MATIC', 'ADA', 'ARB', 'OP', 'NEAR', 'FET', 'PEPE', 'LTC', 'XRP', 'DOGE', 'SHIB', 'RNDR', 'TIA'];

    const noticias = [
        {
            img: "https://cryptologos.cc/logos/arbitrum-arb-logo.png",
            title: "Movimiento de $524M en Arbitrum",
            body: "<strong>INFORME:</strong> Ballena institucional mueve fondos a pools de liquidez. <br><br><strong>VERIFICACIÓN:</strong> Hash 0x7a...e24b en Arbiscan.io. <br><strong>ESTADO:</strong> Validado."
        },
        {
            img: "https://cryptologos.cc/logos/solana-sol-logo.png",
            title: "Acumulación Masiva SOL",
            body: "<strong>INFORME:</strong> 14 billeteras Tier 1 comprando agresivamente. <br><br><strong>DETALLE:</strong> Absorción total de oferta en $145.00. <br><strong>FUENTES:</strong> Solscan Pro."
        },
        {
            img: "https://cryptologos.cc/logos/bitcoin-btc-logo.png",
            title: "Alerta de Ballenas BTC",
            body: "<strong>INFORME:</strong> $1.2B USD ingresando a exchanges tras reporte de la Fed. <br><br><strong>ANÁLISIS:</strong> Preparación de coberturas. Alta volatilidad entrante."
        }
    ];

    function cargarNoticias() {
        document.getElementById('news-list').innerHTML = noticias.map((n, i) => `
            <div class="news-card" onclick="verNoticiaCompleta(${i})">
                <img src="${n.img}" class="news-img" onerror="this.src='https://img.icons8.com/color/96/bitcoin.png'">
                <div>
                    <h4>${n.title}</h4>
                    <p style="font-size:0.7rem; color:#888;">Ver auditoría on-chain completa...</p>
                </div>
            </div>
        `).join('');
    }

    function generarTabla() {
        const tbody = document.getElementById('whale-table');
        const lista = ES_PRO ? monedasElite : monedasElite.slice(0, 10);
        tbody.innerHTML = lista.map(c => {
            const op = Math.random() > 0.5 ? 'COMPRA' : 'VENTA';
            const monto = (Math.random() * 5000000 + 100000).toLocaleString('en-US', {minimumFractionDigits: 2});
            return `
                <tr>
                    <td style="color:var(--gold); font-weight:bold;">${c}</td>
                    <td style="color:${op==='COMPRA'?'var(--green)':'var(--red)'}">${op}</td>
                    <td>$${monto}</td>
                    <td>$${(Math.random()*60000).toFixed(2)}</td>
                    <td><button onclick="verDetalle('${c}', '${monto}')" style="background:var(--gold); border:none; padding:5px 10px; border-radius:6px; font-weight:bold; font-size:0.65rem; cursor:pointer;">ABRIR</button></td>
                </tr>
            `;
        }).join('');
    }

    function verDetalle(coin, monto) {
        if (!ES_PRO) {
            document.getElementById('modal-body').innerHTML = `
                <div style="text-align:center;">
                    <h2 style="color:var(--gold);">ACCESO RESTRINGIDO 🔒</h2>
                    <p style="margin:20px 0; color:#888;">Suscríbete para ver el Informe de Inteligencia, Mapas de Calor y Auditoría Blockchain de ${coin}.</p>
                    <button class="btn btn-gold" onclick="abrirSuscripcion()">DESBLOQUEAR AHORA</button>
                </div>
            `;
        } else {
            document.getElementById('modal-body').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="color:var(--gold);">${coin} INFOSHEET</h2>
                    <span style="font-size:0.6rem; color:var(--green); font-weight:bold;">● LIVE DATA</span>
                </div>
                
                <div class="pro-dashboard">
                    <div class="metric-card"><span class="metric-label">Monto</span><span class="metric-val">$${monto}</span></div>
                    <div class="metric-card"><span class="metric-label">Wallet</span><span class="metric-val" style="font-size:0.7rem;">INSTITUCIONAL</span></div>
                    <div class="metric-card"><span class="metric-label">RSI</span><span class="metric-val">68.4</span></div>
                    <div class="metric-card"><span class="metric-label">Volatilidad</span><span class="metric-val" style="color:var(--red);">ALTA</span></div>
                </div>

                <div style="margin:20px 0;">
                    <div style="display:flex; justify-content:space-between; font-size:0.7rem;"><span>PRESIÓN DE COMPRA</span><span style="color:var(--green);">87.5%</span></div>
                    <div class="pressure-bar"><div class="pressure-fill" style="width:87.5%;"></div></div>
                </div>

                <div style="height:150px; background:#000; border-radius:10px; border:1px solid #333; margin:15px 0; overflow:hidden; position:relative;">
                    <img src="https://charts.tradingview.com/lightweight-charts/example.png" style="width:100%; height:100%; opacity:0.3; object-fit:cover;">
                    <p style="position:absolute; top:40%; left:25%; color:var(--gold); font-size:0.8rem; font-weight:bold;">[ GRÁFICO TÉCNICO L2 ACTIVO ]</p>
                </div>

                <div style="background:#161616; padding:15px; border-radius:10px; font-size:0.8rem; border-left:3px solid var(--gold);">
                    <strong>AUDITORÍA BLOCKCHAIN:</strong><br>
                    <span style="color:#666;">ID:</span> 0x${Math.random().toString(16).slice(2, 12)}...${Math.random().toString(16).slice(2, 6)}<br>
                    <span style="color:#666;">Verificado en:</span> Nodes Explorer Core
                </div>
                <button class="btn btn-gold" style="margin-top:20px;" onclick="cerrarModal()">REGRESAR</button>
            `;
        }
        document.getElementById('modal').style.display = 'block';
    }

    function abrirSuscripcion() {
        document.getElementById('modal-body').innerHTML = `
            <h2 style="text-align:center; color:var(--gold);">WHALE MIRROR PRO 🏆</h2>
            <div style="background:#111; padding:20px; border-radius:15px; margin-top:20px;">
                <p style="text-align:center; color:#888; font-size:0.9rem;">Accede a la terminal completa sin restricciones.</p>
                <ul style="list-style:none; line-height:2.5; font-size:0.9rem; margin:20px 0;">
                    <li>✅ +500 Monedas Actualizadas 1s.</li>
                    <li>✅ Informes de Auditoría Institucional.</li>
                    <li>✅ Mapas de Calor y Presión de Compra.</li>
                </ul>
                <button class="btn btn-gold" onclick="simularPago()">PAGAR CON BINANCE PAY ($9.99)</button>
            </div>
            <button onclick="cerrarModal()" style="width:100%; margin-top:10px; background:transparent; border:none; color:#444;">Cancelar</button>
        `;
        document.getElementById('modal').style.display = 'block';
    }

    function simularPago() {
        ES_PRO = true; cerrarModal(); generarTabla();
        document.getElementById('timer').innerText = "LIVE (MODO PRO)";
        document.getElementById('timer').style.color = "var(--green)";
        document.getElementById('btn-view-all').innerText = "ACCESO TOTAL ACTIVADO ✅";
        alert("¡Suscripción Pro Activada!");
    }

    function verNoticiaCompleta(i) {
        const n = noticias[i];
        document.getElementById('modal-body').innerHTML = `
            <h2 style="color:var(--gold); margin-bottom:15px;">${n.title}</h2>
            <div style="background:#111; padding:20px; border-radius:15px; line-height:1.7;">${n.body}</div>
            <button class="btn btn-gold" style="margin-top:20px;" onclick="cerrarModal()">CERRAR</button>
        `;
        document.getElementById('modal').style.display = 'block';
    }

    function cerrarModal() { document.getElementById('modal').style.display = 'none'; }

    let s = 300;
    setInterval(() => {
        if (ES_PRO) {
            generarTabla(); 
        } else {
            s--; if(s < 0) { s = 300; generarTabla(); }
            let m = Math.floor(s/60); let r = s%60;
            document.getElementById('timer').innerText = `${m}:${r<10?'0'+r:r}`;
        }
    }, 1000);

    cargarNoticias(); generarTabla();
</script>
</body>
</html>
