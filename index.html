<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Whale Mirror - Institutional Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <marquee id="price-ticker">CARGANDO PRECIOS EN VIVO...</marquee>
    </div>

    <header>
        <div class="header-content">
            <div class="live-indicator">● EN VIVO</div>
            <h1>THE WHALE MIRROR</h1>
            <div class="user-status">PLAN: <span style="color:#d4af37">GRATUITO</span></div>
        </div>
    </header>

    <div class="main-layout">
        <section class="chart-section">
            <div class="section-title">ANÁLISIS DE MERCADO GLOBAL</div>
            <div id="tradingview_widget">
                </div>
        </section>

        <section class="news-terminal">
            <div class="section-title">SQUAWK BOX / NEWS FEED</div>
            <div id="news-container" class="news-list">
                </div>
        </section>

        <section class="tracker-section">
            <div class="section-title">RADAR DE BALLENAS (SMART MONEY)</div>
            <div class="tracker-info">Actualización: <span id="update-timer">30s</span></div>
            <table>
                <thead>
                    <tr>
                        <th>ACTIVO</th>
                        <th>FLUJO</th>
                        <th>VOLUMEN USD</th>
                        <th>INFO</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </section>
    </div>

    <div id="modal-detalle" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-full-content"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="script.js"></script>
</body>
</html>
