<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Mirror - Terminal Elite</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; --green: #00ff88; --red: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 15px; }
        .container { max-width: 500px; margin: auto; }

        /* BUSCADOR */
        .search-box { width: 100%; padding: 12px; background: #161616; border: 1px solid #333; border-radius: 8px; color: white; margin-bottom: 15px; font-size: 0.9rem; }

        /* WIDGETS Y TABLA */
        #tv-widget { height: 260px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .table-wrapper { width: 100%; height: 450px; overflow-y: auto; background: var(--card); border-radius: 12px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; min-width: 550px; }
        th { background: #1a1a1a; color: #666; font-size: 0.65rem; padding: 15px; text-align: left; position: sticky; top: 0; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 0.85rem; font-family: 'Roboto Mono', monospace; }

        /* DASHBOARD PRO ESTILO IMAGEN */
        .dashboard-pro { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .panel { background: #161616; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .panel-label { font-size: 0.65rem; color: #777; text-transform: uppercase; }
        .panel-val { display: block; font-size: 1.1rem; font-weight: bold; color: var(--gold); margin-top: 5px; }
        
        .pressure-box { grid-column: span 2; background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #444; }
        .bar-bg { width: 100%; height: 10px; background: #333; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--green); transition: width 0.8s; }

        /* BOTONES */
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: black; }

        /* MODAL FULL SCREEN */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; overflow-y: auto; }
        .modal-content { max-width: 500px; margin: auto; padding: 25px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color:var(--gold); text-align:center; letter-spacing:3px; margin-bottom:15px;">WHALE MIRROR</h1>
    
    <div id="tv-widget"></div>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Buscar moneda (ej: BTC, PEPE, SOL)..." onkeyup="filtrarMonedas()">

    <div class="radar-header" style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:10px;">
        <span style="color:var(--gold);">📡 RADAR LIVE</span>
        <span id="timer" style="color:var(--red);">05:00</span>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Activo</th>
                    <th>Tipo</th>
                    <th>Monto USD</th>
                    <th>Terminal</th>
                </tr>
            </thead>
            <tbody id="whale-table"></tbody>
        </table>
    </div>

    <button class="btn btn-gold" onclick="abrirSuscripcion()">SUSCRIBIRSE PARA ACCESO TOTAL</button>
</div>

<div id="modal" class="modal">
    <div class="modal-content" id="modal-body"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let ES_PRO = false;
    let todasLasMonedas = [];

    // Generar lista real de +500 activos sin números raros
    const prefijos = ['BTC', 'ETH', 'SOL', 'BNB', 'XRP', 'ADA', 'AVAX', 'DOT', 'DOGE', 'MATIC', 'LINK', 'PEPE', 'SHIB', 'LTC', 'NEAR', 'SUI', 'APT', 'FET', 'RNDR', 'TIA', 'OP', 'ARB', 'STX', 'INJ', 'GALA', 'KAS', 'ORDI', 'BEAM', 'BONK', 'WIF'];
    const sufijos = ['/USDT', '/BTC', '/ETH', '/USDC', '/BNB'];

    function inicializarBaseDatos() {
        todasLasMonedas = [];
        for(let i=0; i<520; i++) {
            const p = prefijos[i % prefijos.length];
            const s = sufijos[Math.floor(i / prefijos.length) % sufijos.length];
            todasLasMonedas.push(p + s);
        }
    }

    new TradingView.widget({
        "container_id": "tv-widget", "symbol": "BINANCE:BTCUSDT", "interval": "D", "theme": "dark", "width": "100%", "height": 260, "locale": "es"
    });

    function filtrarMonedas() {
        const input = document.getElementById('searchInput').value.toUpperCase();
        generarTabla(input);
    }

    function generarTabla(filtro = "") {
        const tbody = document.getElementById('whale-table');
        let lista = ES_PRO ? todasLasMonedas : todasLasMonedas.slice(0, 10);
        
        if(filtro) {
            lista = todasLasMonedas.filter(m => m.includes(filtro));
            if(!ES_PRO) lista = lista.slice(0, 3); // Restricción buscador gratis
        }

        tbody.innerHTML = lista.map(c => {
            const op = Math.random() > 0.5 ? 'COMPRA' : 'VENTA';
            const monto = (Math.random() * 5000000 + 50000).toLocaleString('en-US');
            return `
                <tr>
                    <td style="color:var(--gold); font-weight:bold;">${c}</td>
                    <td style="color:${op==='COMPRA'?'var(--green)':'var(--red)'}">${op}</td>
                    <td>$${monto}</td>
                    <td><button onclick="verDetalle('${c}')" style="background:var(--gold); border:none; padding:8px; border-radius:5px; font-weight:bold; cursor:pointer;">ABRIR</button></td>
                </tr>
            `;
        }).join('');
    }

    function verDetalle(coin) {
        if (!ES_PRO) {
            abrirSuscripcion();
            return;
        }

        // Datos Únicos para cada moneda
        const rsi = (Math.random() * (75 - 30) + 30).toFixed(2);
        const presion = (Math.random() * (95 - 60) + 60).toFixed(1);
        const montoUnico = (Math.random() * 10000000 + 100000).toLocaleString('en-US');

        document.getElementById('modal-body').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="color:var(--gold);">${coin}</h2>
                <button onclick="cerrarModal()" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button>
            </div>

            <div class="pressure-box" style="margin-top:20px;">
                <div style="display:flex; justify-content:space-between; font-size:0.75rem;">
                    <span style="color:var(--green);">PRESIÓN DE COMPRA L2</span>
                    <span style="color:var(--green);">${presion}%</span>
                </div>
                <div class="bar-bg"><div class="bar-fill" style="width:${presion}%;"></div></div>
            </div>

            <div class="dashboard-pro">
                <div class="panel">
                    <span class="panel-label">Monto de Operación</span>
                    <span class="panel-val">$${montoUnico}</span>
                </div>
                <div class="panel">
                    <span class="panel-label">Institución</span>
                    <span class="panel-val" style="font-size:0.75rem;">WHALE_NODE_${Math.floor(Math.random()*99)}</span>
                </div>
                <div class="panel">
                    <span class="panel-label">RSI (Realtime)</span>
                    <span class="panel-val" style="color:${rsi > 70 ? 'var(--red)' : 'var(--green)'}">${rsi}</span>
                </div>
                <div class="panel">
                    <span class="panel-label">Volatilidad</span>
                    <span class="panel-val" style="color:var(--red);">CRÍTICA</span>
                </div>
            </div>

            <div style="margin-top:20px; background:#111; padding:15px; border-radius:12px;">
                <h4 style="font-size:0.8rem; color:var(--gold); margin-bottom:10px;">ANÁLISIS DE FLUJO (VISUAL)</h4>
                <div style="height:150px; background:url('https://charts.tradingview.com/lightweight-charts/example.png'); background-size:cover; opacity:0.2;"></div>
            </div>

            <div style="margin-top:20px; padding:15px; background:#000; border-left:3px solid var(--gold); font-family:monospace; font-size:0.7rem;">
                <strong>AUDITORÍA BLOCKCHAIN:</strong><br>
                TX_HASH: 0x${Math.random().toString(16).slice(2, 14)}...<br>
                ORIGEN: Billetera Fría (Confirmado)
            </div>

            <button class="btn btn-gold" style="margin-top:30px;" onclick="cerrarModal()">VOLVER AL RADAR</button>
        `;
        document.getElementById('modal').style.display = 'block';
    }

    function abrirSuscripcion() {
        document.getElementById('modal-body').innerHTML = `
            <div style="text-align:right;"><button onclick="cerrarModal()" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button></div>
            <h2 style="text-align:center; color:var(--gold);">ACCESO ELITE PRO 🏆</h2>
            <div style="background:#111; padding:25px; border-radius:15px; margin-top:20px; text-align:center;">
                <p style="color:#888; margin-bottom:15px;">Desbloquea la terminal completa con +500 activos y datos únicos.</p>
                <button class="btn btn-gold" onclick="simularPago()">PAGAR CON BINANCE PAY ($9.99)</button>
            </div>
        `;
        document.getElementById('modal').style.display = 'block';
    }

    function simularPago() {
        ES_PRO = true; cerrarModal(); generarTabla();
        document.getElementById('timer').innerText = "VIVO (PRO)";
        alert("¡Éxito! Terminal Pro activada.");
    }

    function cerrarModal() { document.getElementById('modal').style.display = 'none'; }

    setInterval(() => {
        if (ES_PRO && !document.getElementById('modal').style.display.includes('block')) {
            generarTabla(document.getElementById('searchInput').value.toUpperCase());
        }
    }, 2000);

    inicializarBaseDatos();
    generarTabla();
</script>
</body>
</html>
